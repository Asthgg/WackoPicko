name: Secret Scan

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: fluidattacks/ss-action@0.2.0
        id: scan
        with:
          scan_config_path: .github/secret-scan-config.yaml
          scanner_mode: full

      - name: Upload CSV artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-results-csv
          path: results.csv
          if-no-files-found: error

      - name: Fail build if vulnerabilities were found
        if: steps.scan.outputs.vulnerabilities_found == 'true'
        run: exit 1
